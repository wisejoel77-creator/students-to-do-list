<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student To-Do List</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }
    .task-done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-header text-center bg-primary text-white">
          <h4 class="mb-0">Student To-Do List ⏰</h4>
        </div>

        <div class="card-body">

          <!-- Input Section -->
          <div class="input-group mb-3">
            <input type="text" id="taskInput" class="form-control" placeholder="Enter a task...">
            <input type="time" id="timeInput" class="form-control">
            <button class="btn btn-success" onclick="addTask()">Add</button>
          </div>

          <!-- Task List -->
          <ul class="list-group" id="taskList"></ul>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks.forEach((task, index) => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';

      const label = document.createElement('div');
      label.className = 'flex-grow-1';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'form-check-input me-2';
      checkbox.checked = task.done;

      const textSpan = document.createElement('span');
      textSpan.textContent = `${task.text} (${task.time})`;

      if (task.done) textSpan.classList.add('task-done');

      checkbox.addEventListener('change', function () {
        tasks[index].done = this.checked;
        saveTasks();
        renderTasks();
      });

      label.appendChild(checkbox);
      label.appendChild(textSpan);

      // Edit button
      const editBtn = document.createElement('button');
      editBtn.className = 'btn btn-sm btn-warning me-2';
      editBtn.textContent = 'Edit';
      editBtn.onclick = function () {
        const newText = prompt('Edit task:', task.text);
        const newTime = prompt('Edit time (HH:MM):', task.time);

        if (newText && newTime) {
          tasks[index].text = newText;
          tasks[index].time = newTime;
          saveTasks();
          renderTasks();
        }
      };

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn btn-sm btn-danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = function () {
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
      };

      const btnGroup = document.createElement('div');
      btnGroup.appendChild(editBtn);
      btnGroup.appendChild(deleteBtn);

      li.appendChild(label);
      li.appendChild(btnGroup);

      list.appendChild(li);
    });
  }

  function addTask() {
    const taskInput = document.getElementById('taskInput');
    const timeInput = document.getElementById('timeInput');

    const taskText = taskInput.value.trim();
    const taskTime = timeInput.value;

    if (taskText === '' || taskTime === '') {
      alert('Please enter both task and time!');
      return;
    }

    tasks.push({
      text: taskText,
      time: taskTime,
      done: false
    });

    saveTasks();
    renderTasks();

    taskInput.value = '';
    timeInput.value = '';
  }

  // Enter key support
  document.getElementById('taskInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
      addTask();
    }
  });

  // Load tasks
  renderTasks();
</script>

</body>
</html>

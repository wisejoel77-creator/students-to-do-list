<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student To-Do List</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }
    .task-done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow-sm">
          <div class="card-header text-center bg-primary text-white">
            <h4 class="mb-0">Student To-Do List</h4>
          </div>

          <div class="card-body">

            <div class="input-group mb-3">
              <input type="text" id="taskInput" class="form-control" placeholder="Enter a task...">
              <button class="btn btn-success" onclick="addTask()">Add</button>
            </div>

            <ul class="list-group" id="taskList">
              <!-- Tasks will appear here -->
            </ul>

          </div>
        </div>

      </div>
    </div>

  </div>

  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim();

      if (taskText === '') return;

      const li = document.createElement('li');
      li.className = 'list-group-item d-flex align-items-center justify-content-between';

      const label = document.createElement('label');
      label.className = 'ms-2 flex-grow-1';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'form-check-input me-2';

      checkbox.addEventListener('change', function () {
        if (this.checked) {
          label.classList.add('task-done');
        } else {
          label.classList.remove('task-done');
        }
      });

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(taskText));

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn btn-sm btn-danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = function () {
        li.remove();
      };

      li.appendChild(label);
      li.appendChild(deleteBtn);

      document.getElementById('taskList').appendChild(li);

      input.value = '';
    }

    // Allow Enter key to add task
    document.getElementById('taskInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        addTask();
      }
    });
  </script>

</body>
</html>
